title = "Mapping Black Philly Art"
baseURL = 'https://artvizphilly.github.io/'
languageCode = 'en-us'
theme = "ananke"

resourceDir = "../resources"
staticDir = "../static"
enableRobotsTXT = true

SectionPagesMenu = "main"

[pagination]
  pagerSize = 10

[params]
  author = "Alex Wermer-Colan"
  description = "Visualizing Wikidata on Black artists in Philadelphia. A collaboration between the Philadelphia Museum of Art and Temple University."
  background_color_class = "bg-dark-blue"
  body_classes = "avenir bg-near-white"
  recent_posts_number = 5
  show_reading_time = true

[params.ananke]
  show_recent_posts = true

[menu]
    [[menu.main]]
    identifier = "syllabus"
    name       = "Syllabus"
    url        = "/syllabus/"
    weight     = 1

    [[menu.main]]
    identifier = "resources"
    name       = "Resources"
    url        = "/resources/"
    weight     = 2
